# Dependabot Configuration -- Risk-Tiered Dependency Management (#188)
#
# DESIGN RATIONALE (7 decisions):
#
# D1: pip group structure (verified #188; update when dep count changes)
#   - "pip-minor-patch" group: patch + minor updates together (low ceremony).
#   - Major updates: ungrouped (each gets its own PR for manual review).
#   - Dev/test deps are NOT separated from runtime deps because:
#     (a) Jerry's dep count is small (~20 direct). Separate groups
#         would produce 2 PRs where 1 suffices with no loss of visibility.
#     (b) CI runs the full test suite on every PR regardless, so a broken
#         test dep is caught the same way as a broken runtime dep.
#     (c) The risk profile of patch/minor is the same for both categories.
#     If the dep count grows past ~40, reconsider splitting by adding a
#     second group with `dependency-type: "development"`.
#   - DEVIATION from risk analysis (R-3, R-4): The FMEA raised three
#     independent concerns: (1) transitive conflict risk (RPN 120),
#     (2) user-facing blast radius for runtime deps, (3) pytest ecosystem
#     coupling. The `allow: direct` policy (D3) addresses concern #1 only
#     (prevents standalone transitive PRs). Concerns #2 and #3 are
#     accepted at current scale: (2) ~7 runtime deps produce low PR
#     volume; CI catches breakage pre-merge; (3) pytest deps share no
#     cross-constraints with non-pytest dev tools (ruff, pyright, mypy).
#     Revisit if dep count exceeds ~40 or if runtime dep breakage occurs.
#     See: projects/PROJ-030-bugs/research/dependabot-risk-analysis.md
#
# D2: github-actions group structure
#   - "actions-minor-patch" group: patch + minor SHA rotations (low risk;
#     all actions are SHA-pinned per EN-001, so even "minor" is a SHA swap).
#   - Major updates: ungrouped. Jerry just merged v5->v6 (checkout) and
#     v4->v7 (setup-uv) after individual review. Major action bumps can
#     change behavior (e.g., Node.js runtime version, input/output schema).
#     These warrant individual PRs with manual review.
#   - CONSERVATIVE OVERRIDE of risk analysis (R-1): The FMEA recommended
#     grouping ALL Actions (including major) since SHA pinning makes even
#     major bumps "just a hash change." This config is MORE conservative —
#     major bumps stay individual because they CAN change runtime behavior
#     (Node.js version, input schemas) regardless of the pin mechanism.
#
# D3: Transitive dependency handling
#   - Using `allow` with `dependency-type: direct` for pip.
#     This tells Dependabot to only open PRs for packages listed directly
#     in pyproject.toml (and requirements*.txt), not for transitive deps
#     like gherkin-official (pulled in by pytest-bdd).
#   - Why `allow` instead of `exclude-patterns` (vs. risk analysis R-5):
#     (a) gherkin-official 29->39 was a transitive dep conflict. Excluding
#         it by name is whack-a-mole; new transitive deps appear over time.
#         R-5 recommended an explicit ignore list; `allow: direct` is more
#         durable and achieves the same outcome with a single policy line.
#     (b) `allow: dependency-type: direct` is a durable policy: Dependabot
#         only touches what we explicitly declared. Transitive deps update
#         when their parent direct dep is bumped (e.g., pytest-bdd bump
#         pulls in the compatible gherkin-official version via uv.lock).
#   - HOW IT WORKS: Dependabot classifies deps as direct/indirect via
#     two mechanisms: (1) packages listed in pyproject.toml [dependencies],
#     [project.optional-dependencies], or [dependency-groups] are always
#     classified as direct — this is Jerry's primary dependency manifest;
#     (2) packages in requirements*.txt with `# via <parent>` annotations
#     are classified as indirect (these files are generated by uv pip compile).
#     Debug: if an unexpected PR appears, check both pyproject.toml
#     (is it a declared dependency?) and requirements-*.txt (does it have
#     a `# via` annotation?).
#   - CAVEAT: Transitive dep compromises will NOT generate a Dependabot
#     PR. Compensating DETECTION controls: `pip-audit` in CI catches
#     known CVEs; `uv.lock` diff review on grouped PRs reveals transitive
#     shifts. These are detectors, not remediators — a transitive CVE
#     still requires manual intervention (bump the parent dep or add an
#     explicit override). Maximum transitive CVE detection latency: up to
#     24 hours (daily scheduled security-scan.yml runs pip-audit against
#     the locked dependency tree independent of PR activity).
#     REMEDIATION when a transitive CVE is detected:
#       1. Identify which direct dep pulls in the vulnerable transitive
#       2. Bump the direct dep: `uv add <pkg>@latest && uv lock`
#       3. If no direct dep update fixes it: `uv add <vulnerable-pkg>>=<fixed>`
#          to make it a direct dep temporarily
#       4. Run `uv run pip-audit` to verify the fix
#     See: .github/workflows/security-scan.yml
#     (C4 tournament: S-001 RT-002, S-004 PM-001, S-012 FM-009)
#   - GitHub Actions are all direct references (no transitive concept), so
#     no `allow` restriction is needed there.
#
# D4: Security update handling
#   - Security updates are ungrouped by default. Each CVE gets its own PR
#     with clear visibility into what vulnerability it addresses.
#   - Dependabot security updates are event-driven (triggered by GitHub
#     Advisory Database updates), not schedule-driven. The `schedule`
#     interval controls version updates only. Security update PRs are
#     created as soon as a compatible fix is available, regardless of the
#     configured schedule.
#   - Note: `open-pull-requests-limit` applies to security PRs too (CC-005).
#     At Jerry's scale this is unlikely to saturate, but a burst of CVEs
#     could compete with version update PRs for queue slots.
#   - Security updates must be enabled in repo Settings > Code security >
#     Dependabot security updates. No additional dependabot.yml config is
#     needed to keep them ungrouped (that is the default behavior).
#   - If we later want to GROUP security updates, add a group with
#     `applies-to: security-updates` inside the relevant ecosystem block.
#
# D5: Commit message prefix
#   - "ci" for actions, "deps" for pip. Unchanged from current config.
#   - Both prefixes are caught by version-bump.yml Filter B (#187) which
#     skips the version-bump job for ci: and deps: prefixed commits.
#   - No downstream impact from prefix choice beyond Filter B. Labels
#     provide the risk-level signaling (see D7).
#
# D6: open-pull-requests-limit (verified #188; update when dep count changes)
#   - Actions: 10 (unchanged). With grouping, patch+minor collapses to ~1
#     grouped PR consuming 1 slot. Effective ceiling for individual major
#     PRs is 9. Jerry uses ~7 distinct actions, so headroom is adequate.
#   - Pip: 5 -> 10. With direct-only filtering (D3), the grouped PR count
#     is small (~1 for patch/minor, consuming 1 slot). The limit of 10
#     accommodates individual major-version PRs for the ~8 direct runtime deps plus
#     ~4 direct dev deps. The old limit of 5 could queue PRs when
#     multiple majors are pending simultaneously.
#
# D7: Labels (verified #188; update when PR volume changes)
#   - All Dependabot PRs get "dependencies" (existing).
#   - Actions PRs additionally get "ci" (existing).
#   - No risk-tier labels added. At Jerry's current PR volume (~2-4 PRs
#     per week after grouping), the PR title already communicates risk:
#     grouped PRs say "Bump the X group" (low risk), individual PRs show
#     the specific major version change (review required). Adding labels
#     like "risk:low" would require creating the label first and provides
#     marginal value at this scale.
#
# REFERENCES:
#   - Research: projects/PROJ-030-bugs/research/merge-queue-vs-dependabot-grouping.md
#   - Risk analysis (FMEA): projects/PROJ-030-bugs/research/dependabot-risk-analysis.md
#   - Supply chain assessment: projects/PROJ-030-bugs/reviews/188-s002-devils-advocate.md
#   - Security scan: .github/workflows/security-scan.yml (daily pip-audit)
#   - Filter B: .github/workflows/version-bump.yml (#187)
#   - SHA pinning: EN-001
#   - Dependabot options: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference

version: 2

updates:
  # ==================================================================
  # GitHub Actions -- weekly check for pinned SHA updates
  # ==================================================================
  # Jerry SHA-pins all actions per EN-001. Dependabot detects when a new
  # release is available and proposes the updated SHA.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 10
    groups:
      # D2: Patch + minor SHA rotations are low-risk for pinned actions.
      # Produces ~1 grouped PR per week instead of ~7 individual PRs.
      # Example: actions/checkout v6.0.1 -> v6.0.2 (patch SHA swap).
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Major updates (e.g., actions/checkout v6->v7) remain ungrouped.
    # Each gets its own PR for individual review of breaking changes.

  # ==================================================================
  # pip -- weekly check for Python dependency updates
  # ==================================================================
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    # D3: Only bump direct dependencies declared in pyproject.toml and
    # requirements*.txt. Transitive deps (gherkin-official, mako,
    # markupsafe, coverage, pluggy, etc.) update when their parent
    # direct dep is bumped and uv.lock is regenerated.
    allow:
      - dependency-type: "direct"
    groups:
      # D1: Patch + minor updates grouped together. SemVer contract says
      # these should be backward-compatible. CI catches the exceptions.
      # Produces ~1 grouped PR instead of ~5-8 individual PRs.
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Major updates (e.g., pytest 9->10, ruff 1->2) remain ungrouped.
    # Each gets its own PR for individual review. Major version bumps
    # may require code changes (API removals, behavior changes).
    # NOTE: ruff uses 0.x versioning where 0.x->0.(x+1) is semantically
    # major (new default-enabled lint rules). Dependabot classifies these
    # as "minor" — review ruff grouped PRs with extra care. (PM-008)
    #
    # REVIEWER GUIDE for grouped PRs (DA-004, RT-001):
    #   If a grouped PR fails CI:
    #     1. Check which dep broke: read the test failure output
    #     2. Comment `@dependabot ignore <pkg> minor version` to exclude it
    #     3. Dependabot recreates the group without the excluded dep
    #     4. The excluded dep gets its own individual PR for separate review
    #   If you need to split a group entirely:
    #     1. Close the grouped PR
    #     2. Temporarily remove the `groups:` block from this file
    #     3. Dependabot creates individual PRs on next schedule run
    #     4. Identify and fix the problem, then restore the groups block
    #   Supply chain verification before merging ANY dep PR (RT-001):
    #     1. Review the uv.lock diff — check for unexpected transitive changes
    #     2. Verify pip-audit passed in CI (check the security-scan job)
    #     3. For unfamiliar packages: check PyPI release date and changelog
    #     4. For grouped PRs: scan each package individually, not just CI result
    #   Post-merge regression (PM-003):
    #     If breakage surfaces after merge (CI passed but runtime fails):
    #     1. Revert the merged PR: `git revert <merge-commit>`
    #     2. Open an issue tracking which dep caused the regression
    #     3. Re-merge the group without the problematic dep
