# Jerry Framework Version Bump Pipeline
# Triggers on push to main, determines bump type from Conventional Commits,
# updates version across all files via bump-my-version, and creates a tag
# that triggers release.yml.
#
# DUAL-FILTER ARCHITECTURE (#187):
# Two complementary (not redundant) filters prevent unnecessary runs:
#   Filter A (paths-ignore, trigger level): Coarse file-based filter.
#     GitHub evaluates this BEFORE the workflow is queued. If ALL changed
#     files are in paths-ignore, the workflow never starts. Zero CI cost.
#   Filter B (startsWith, job-level if:): Fine commit-type filter.
#     Evaluated AFTER the workflow is queued but before any steps run.
#     Skips the job for non-bump conventional commit prefixes.
# Together they eliminate ~60-70% of unnecessary runs. See research:
#   projects/PROJ-030-bugs/research/workflow-filtering-research.md
#
# References:
#   - EN-108: Version Bumping Strategy
#   - TASK-003: Design Version Bumping Process
#   - #187: Dual filtering implementation

name: Version Bump

on:
  push:
    branches: [main]
    # #187 Filter A: Skip workflow when ONLY non-version-relevant files change.
    # Uses paths-ignore (denylist) because the set of irrelevant paths is
    # smaller and more stable than enumerating all version-relevant paths.
    # Does NOT affect workflow_dispatch — manual triggers always fire.
    # Source: https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#onpushpull_requestpull_request_targetpathspaths-ignore
    paths-ignore:
      # Only exclude files that can NEVER affect the shipped plugin.
      # Jerry is a Claude Code plugin — skills/, hooks/, .context/, .claude/,
      # scripts/, agents, rules, templates are ALL product surface.
      # When in doubt, do NOT exclude. A wasted CI run (BumpType.NONE)
      # is better than a missed version bump.
      #
      # --- Documentation site (published separately, not part of plugin) ---
      # Product-relevant docs/ subdirs intentionally NOT excluded:
      #   docs/schemas/    — runtime validation schemas (validate-agent-frontmatter.py)
      #   docs/governance/ — JERRY_CONSTITUTION.md, C4-escalation (AE-001)
      #   docs/knowledge/  — knowledge files loaded by agents at runtime
      #   docs/design/     — ADRs; baselined ADR changes trigger AE-004 (C4)
      #   docs/experience/ — learnings captured by agents
      # MAINTENANCE: When creating a new docs/ subdirectory, assess if it
      # contains runtime files loaded by agents or enforcement. If yes: do
      # NOT add here. If pure doc-site content: add to this list.
      # (red-exploit Finding 1: projects/PROJ-030-bugs/reviews/)
      - 'docs/reference/**'
      - 'docs/explanation/**'
      - 'docs/howto/**'
      - 'docs/playbooks/**'
      - 'docs/blog/**'
      - 'docs/index.md'
      - 'docs/INSTALLATION.md'
      - 'docs/BOOTSTRAP.md'
      - 'docs/CLAUDE-MD-GUIDE.md'
      - 'site/**'
      - 'overrides/**'
      - 'mkdocs.yml'
      - 'CNAME'
      # --- Project management (internal work tracking) ---
      - 'projects/**'
      # --- Operational (maintainer tooling, not shipped) ---
      - 'runbooks/**'
      - '.pre-commit-config.yaml'
      - 'pytest.ini'
      - 'requirements-*.txt'
      # --- Community/legal (no behavioral impact) ---
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'SECURITY.md'
      - 'SOUNDTRACK.md'
      - 'README.md'
      # --- CI config (enumerated, NOT blanket .github/**) ---
      # release.yml is NOT excluded — artifact packaging changes are product-relevant.
      # (red-exploit Finding 2)
      - '.github/workflows/ci.yml'
      - '.github/workflows/version-bump.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/pat-monitor.yml'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      # MAINTENANCE: When adding new .github/ files, assess product relevance.
      # release.yml is NOT excluded — artifact packaging is product-relevant.
      # ISSUE_TEMPLATE and PR templates are community files, not product.
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (overrides commit-based detection)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Pre-release label (alpha, beta, rc). Leave empty for stable.'
        required: false
        type: string

permissions:
  contents: write

# Prevent concurrent bumps
concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    name: Determine and Apply Version Bump
    runs-on: ubuntu-latest

    # BUG-003 (complete fix): UV_LOCKED prevents all uv sync/run commands
    # from modifying uv.lock AND fails if the lockfile is stale relative to
    # pyproject.toml. Stricter than UV_FROZEN (which silently uses stale
    # lockfiles). The original fix only added --frozen to uv sync, but
    # uv run (jerry CLI, sync_versions.py) also re-resolves the lockfile
    # when CI uv version differs from the one that generated it.
    # Source: https://docs.astral.sh/uv/reference/environment/
    env:
      UV_LOCKED: "1"

    # #187 Filter B: Skip non-bump conventional commit prefixes.
    # Only feat:, fix:, perf:, and breaking changes (!) produce bumps.
    # All other prefixes resolve to BumpType.NONE in the CLI — skip them.
    #
    # startsWith() is case-insensitive: "This function is not case sensitive."
    #   Source: https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/evaluate-expressions#startswith
    #
    # head_commit.message is null on workflow_dispatch (no push commit).
    # Null coerces to empty string '', making all startsWith() return false
    # and all !startsWith() return true. workflow_dispatch always passes.
    #   Source: https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/evaluate-expressions#literals
    #
    # NOTE: Assumes standard merge commits (not squash/rebase).
    # With standard merges, head_commit.message is "Merge pull request #N..."
    # which passes all startsWith checks. detect-bump-type reads the
    # individual commits inside the merge. With rebase merges, only the last
    # commit's subject is checked, which could skip a PR with mixed types.
    # (red-exploit V6 — not applicable; Jerry uses standard merges)
    # Verify: GitHub repo Settings > General > Pull Requests > merge method
    #
    # Research: projects/PROJ-030-bugs/research/workflow-filtering-research.md
    #
    # SECURITY: workflow_dispatch has no secondary approval — any actor with
    # repo write access can trigger any bump type. Two threat scenarios:
    #   1. Authorized collaborator: accepted risk (write access = trusted)
    #   2. Compromised PAT: accepted risk — VERSION_BUMP_PAT has contents:write
    #      scope; a compromised PAT can push to main directly anyway, making
    #      workflow_dispatch a less interesting attack vector.
    # If external write contributors are added, configure a GitHub Environment
    # with required reviewers.
    # (eng-security FINDING-001: projects/PROJ-030-bugs/reviews/eng-security-187-dual-filter-review.md)
    #
    # MAINTENANCE: The denylist below must ONLY contain prefixes that
    # detect-bump-type treats as BumpType.NONE. Do NOT add prefixes that
    # could be bump-worthy (feat:, fix:, perf:).
    # (eng-security FINDING-003: projects/PROJ-030-bugs/reviews/eng-security-187-dual-filter-review.md)
    #
    # Prefix rationale:
    #   deps: — Jerry convention for dependency updates not using build(deps):
    #   revert: — rolling back a feat/fix does not create a new forward bump
    #   [skip-bump] intentionally absent from workflow_dispatch (no commit)
    if: >-
      (
        github.event_name == 'workflow_dispatch'
      ) ||
      (
        github.event_name != 'workflow_dispatch' &&
        !contains(github.event.head_commit.message, '[skip-bump]') &&
        github.actor != 'github-actions[bot]' &&
        !startsWith(github.event.head_commit.message, 'ci:') &&
        !startsWith(github.event.head_commit.message, 'ci(') &&
        !startsWith(github.event.head_commit.message, 'deps:') &&
        !startsWith(github.event.head_commit.message, 'deps(') &&
        !startsWith(github.event.head_commit.message, 'docs:') &&
        !startsWith(github.event.head_commit.message, 'docs(') &&
        !startsWith(github.event.head_commit.message, 'chore:') &&
        !startsWith(github.event.head_commit.message, 'chore(') &&
        !startsWith(github.event.head_commit.message, 'style:') &&
        !startsWith(github.event.head_commit.message, 'style(') &&
        !startsWith(github.event.head_commit.message, 'refactor:') &&
        !startsWith(github.event.head_commit.message, 'refactor(') &&
        !startsWith(github.event.head_commit.message, 'test:') &&
        !startsWith(github.event.head_commit.message, 'test(') &&
        !startsWith(github.event.head_commit.message, 'build:') &&
        !startsWith(github.event.head_commit.message, 'build(') &&
        !startsWith(github.event.head_commit.message, 'revert:') &&
        !startsWith(github.event.head_commit.message, 'revert(')
      )

    # NOTE on per-step `if:` guards: Steps that modify the repo (bump, push)
    # use `if: steps.bump.outputs.type != 'none'` to skip when there's nothing
    # to bump. The "Job summary" step uses `if: always()` so the run always
    # reports its outcome regardless of skip/success/failure.

    steps:
      # ------------------------------------------------------------------
      # Checkout with PAT for push-through-branch-protection
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.VERSION_BUMP_PAT }}

      # ------------------------------------------------------------------
      # Set up Python + UV + bump-my-version
      # ------------------------------------------------------------------
      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version: "0.10.9"

      - name: Set up Python
        run: uv python install 3.14

      # BUG-003/RISK-01: Pin bump-my-version to exact version to prevent
      # supply chain attacks via PyPI package compromise.
      # NOTE: Dependabot does NOT track `uv tool install` version pins
      # (only `uses:` action pins and requirements files). This pin must
      # be updated manually. Check PyPI for new releases quarterly.
      - name: Install bump-my-version
        run: uv tool install 'bump-my-version==1.2.7'

      # ------------------------------------------------------------------
      # Install project dependencies for bump detection
      # BUG-003: UV_LOCKED=1 (job-level env) handles lockfile protection.
      # Do NOT add --frozen here — it conflicts with UV_LOCKED.
      # ------------------------------------------------------------------
      - name: Install project dependencies
        run: uv sync

      # ------------------------------------------------------------------
      # Determine bump type from commits
      # ------------------------------------------------------------------
      - name: Determine bump type
        id: bump
        run: |
          # Manual dispatch overrides commit-based detection
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ github.event.inputs.bump_type }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ github.event.inputs.prerelease }}" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch: type=${{ github.event.inputs.bump_type }}, prerelease=${{ github.event.inputs.prerelease }}"
            exit 0
          fi

          # Use jerry CLI for case-insensitive conventional commit detection
          # BUG-002: Replaces inline bash regex that rejected uppercase scopes
          BUMP_TYPE=$(uv run jerry ci detect-bump-type --since-tag)

          echo "Determined bump type: $BUMP_TYPE"
          echo "type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "prerelease=" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Ensure clean working tree before bump (BUG-003)
      # BUG-003: Fail-fast guard. With UV_LOCKED=1, uv sync/run cannot
      # modify uv.lock. If the tree is dirty, something unexpected happened.
      # Fail loudly so a human investigates (allow_dirty = false is a
      # supply chain security control).
      # ------------------------------------------------------------------
      - name: Ensure clean working tree
        if: steps.bump.outputs.type != 'none'
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Working tree unexpectedly dirty before bump (UV_LOCKED=1 should prevent this)"
            git diff --name-only
            echo ""
            echo "If only uv.lock is dirty, the lockfile needs regeneration."
            echo "Run 'uv lock' locally and commit the updated uv.lock."
            exit 1
          fi

      # ------------------------------------------------------------------
      # Apply version bump
      # ------------------------------------------------------------------
      - name: Apply version bump
        if: steps.bump.outputs.type != 'none'
        run: |
          BUMP_TYPE="${{ steps.bump.outputs.type }}"
          PRERELEASE="${{ steps.bump.outputs.prerelease }}"

          # Configure git identity for the bump commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Applying $BUMP_TYPE bump..."

          # BUG-003/RISK-02: Validate prerelease input is alphanumeric only.
          # Prevents shell injection via workflow_dispatch free-form string.
          if [[ -n "$PRERELEASE" && ! "$PRERELEASE" =~ ^[a-zA-Z0-9]+$ ]]; then
            echo "::error::Invalid prerelease label '$PRERELEASE'. Must be alphanumeric (e.g., alpha, beta, rc)."
            exit 1
          fi

          if [[ -n "$PRERELEASE" ]]; then
            echo "Pre-release: $PRERELEASE"
            bump-my-version bump "$BUMP_TYPE" --no-tag
            bump-my-version bump pre_l --no-commit --no-tag --new-version "$(grep -oP 'version = "\K[^"]+' pyproject.toml | head -1)-${PRERELEASE}.1"
          else
            bump-my-version bump "$BUMP_TYPE"
          fi

          # BUG-003/FIX: Regenerate uv.lock after version bump.
          # bump-my-version changes the version in pyproject.toml, making
          # uv.lock stale. UV_LOCKED blocks subsequent uv commands without
          # this step. In the prerelease path, the amend also folds the
          # --no-commit changes from line 171 into the bump commit.
          # Unset UV_LOCKED temporarily so uv lock can update the file.
          UV_LOCKED=0 uv lock

          # Guard: verify uv lock only changed the jerry version field,
          # not transitive dependencies. A broader change could indicate
          # a supply chain issue (red-exploit Finding 1).
          LOCK_DIFF=$(git diff --unified=0 uv.lock | grep "^[+-]" | grep -v "^[+-][+-][+-]" || true)
          LOCK_LINES=$(echo "$LOCK_DIFF" | grep -c "." || true)
          if [[ "$LOCK_LINES" -gt 2 ]]; then
            echo "::warning::uv.lock changed more than the version field ($LOCK_LINES diff lines). Review the lockfile changes."
            git diff uv.lock
          fi

          git add uv.lock
          git commit --amend --no-edit

          # Re-create the tag at the amended commit SHA.
          # bump-my-version created the tag at the pre-amend commit (C1).
          # The amend creates a new commit (C2), orphaning C1. Without
          # re-tagging, the release tag points to a commit that does NOT
          # include the regenerated uv.lock. (eng-devsecops Finding 5)
          NEW_VERSION=$(grep -oP '^version = "\K[^"]+' pyproject.toml | head -1)
          if git tag -l "v${NEW_VERSION}" | grep -q .; then
            git tag -d "v${NEW_VERSION}"
            git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
            echo "Re-tagged v${NEW_VERSION} at amended commit $(git rev-parse HEAD)"
          fi

      # ------------------------------------------------------------------
      # Validate version consistency
      # BUG-003: UV_LOCKED=1 (job-level env) prevents lockfile modification.
      # Do NOT add --frozen — it conflicts with UV_LOCKED.
      # ------------------------------------------------------------------
      - name: Validate version sync
        if: steps.bump.outputs.type != 'none'
        run: |
          uv sync
          uv run python scripts/sync_versions.py --check

      # ------------------------------------------------------------------
      # Extract new version for logging
      # ------------------------------------------------------------------
      - name: Extract new version
        if: steps.bump.outputs.type != 'none'
        id: version
        run: |
          NEW_VERSION=$(grep -oP '^version = "\K[^"]+' pyproject.toml | head -1)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      # ------------------------------------------------------------------
      # Push version commit and tag
      # ------------------------------------------------------------------
      - name: Push changes
        if: steps.bump.outputs.type != 'none'
        run: |
          git push origin main --follow-tags
          echo "Pushed version v${{ steps.version.outputs.version }}"

      # ------------------------------------------------------------------
      # Summary
      # ------------------------------------------------------------------
      - name: Job summary
        if: always()
        run: |
          if [[ "${{ steps.bump.outputs.type }}" == "none" ]]; then
            echo "## Version Bump: Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "No bump-worthy commits since last tag." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Version Bump: v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Bump type:** ${{ steps.bump.outputs.type }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Tag:** v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Trigger:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          fi
