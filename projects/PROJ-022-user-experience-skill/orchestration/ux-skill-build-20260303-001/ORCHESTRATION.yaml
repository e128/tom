# CROSS-SKILL INTEGRATION
# =============================================================================
cross_skill_integration:
  eng_team:
    description: "/eng-team agents invoked at specific pipeline phases for security and quality"

    invocations:
      - id: "eng-architect-threat-model"
        agent: "jerry:eng-architect"
        when: "pipeline_foundation phase-3 (after ux-orchestrator agent exists)"
        purpose: "MCP threat model: Figma OAuth trust boundaries, Miro API security, credential lifecycle"
