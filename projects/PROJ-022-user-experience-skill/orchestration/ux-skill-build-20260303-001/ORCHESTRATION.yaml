  status: "ACTIVE"
  scope: "ALL 5 waves orchestrated in this workflow. GitHub issue #138 closure requires Wave 1 + Parent Orchestrator minimum; Waves 2-5 continue in the same orchestration."

  id_source: "auto"
  id_format: "semantic-date-seq"

  patterns:
    - SEQUENTIAL        # Wave gates enforce strict pipeline ordering
    - CONCURRENT        # Parallel artifact creation within phases
    - WAVE_GATED        # Each wave requires a signoff document before next begins
    - BARRIER_SYNC      # 5 sync barriers at wave transitions
    - CONDITIONAL       # FEAT-020 (/ux-ai-first-design) has activation criteria

  constraints:
    max_agent_nesting: 1                  # P-003 hard constraint (H-01)
    file_persistence: true                # P-002 mandatory persistence
    user_authority: true                  # P-020 user authority (H-02)
    max_concurrent_agents: 3              # Per-pipeline parallel cap
    max_quality_gate_retries: 6           # User override (default framework: 3)
    min_creator_critic_iterations: 3      # H-14 minimum
    checkpoint_frequency: "PER_ARTIFACT"  # Per-artifact commit strategy
    criticality: "C4"
    commit_on_artifact_pass: true
    commit_format: "feat(PROJ-022): add {artifact-name} [C4: {score}] [skip-bump]"

# =============================================================================
# EXECUTION PROTOCOL
# =============================================================================
execution_protocol:
  orchestrator_role: "Main context reads ORCHESTRATION.yaml, dispatches background agents, updates SSOT, commits"

  artifact_loop:
    description: "For each artifact in the execution queue"
    steps:
      1_identify: "Read ORCHESTRATION.yaml resumption.recovery_state to find next artifact"
      2_dispatch_creator: "Launch background Agent (creator) with artifact path, input files, reference patterns"
      3_wait_for_creator: "Wait for background agent completion; creator writes artifact to specified path"
      4_dispatch_adversary: "Launch background Agent (adv-scorer) with artifact path and C4 quality gate config"
      5_check_score:
        pass: ">= 0.95 → update ORCHESTRATION.yaml agent entry (quality_score, quality_verdict=PASS, quality_iteration) → git commit artifact + ORCHESTRATION.yaml"
        revise: "< 0.95, iteration < 6 → launch background Agent (creator) with adversary findings for revision → go to step 4"
        escalate: "< 0.95, iteration = 6 → mark quality_verdict=MAX_ITERATIONS → escalate to user"
      6_update_ssot: "Update ORCHESTRATION.yaml: agent status, pipeline progress_percent, metrics counters"
      7_update_worktracker: "Update WORKTRACKER.md Feature status for the completed artifact"
      8_commit: "git commit with format: feat(PROJ-022): add {artifact-name} [C4: {score}] [skip-bump]"
      9_next: "Move to next artifact in dependency order"

  parallel_execution:
    description: "When execution_mode is PARALLEL, dispatch up to max_concurrent_agents (3) background creators simultaneously"
    wait_strategy: "Wait for ALL parallel creators to complete before dispatching adversary reviews"
    adversary_reviews: "Run adversary reviews sequentially (one at a time) to avoid context contention"

  wave_gate_check:
    description: "At wave boundaries, verify all artifacts in the pipeline have quality_verdict=PASS"
    steps:
      1_verify: "Check all agent entries in the pipeline have quality_verdict=PASS"
      2_create_signoff: "Dispatch background creator for the wave signoff document"
      3_score_signoff: "Run C4 adversary review on the signoff document"
      4_update_gate: "Update wave_gates entry: status=PASSED, completed_at=timestamp"
      5_unlock: "Update exit_pipelines entry_condition to reflect gate passage"

  session_boundaries:
    on_session_start: "Read ORCHESTRATION.yaml resumption.recovery_state → identify current position → resume"
    on_session_end: "Update ORCHESTRATION.yaml with current state → commit → record in ORCHESTRATION_WORKTRACKER.md"
    on_compaction: "AE-006e: checkpoint to ORCHESTRATION.yaml immediately → commit → warn user"

