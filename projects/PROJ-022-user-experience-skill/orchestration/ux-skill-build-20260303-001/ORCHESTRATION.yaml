        background: true
        quality_gate: "C4 >= 0.95"

      - id: "eng-devsecops-ci-gate"
        agent: "jerry:eng-devsecops"
        when: "pipeline_foundation phase-3 (parallel with rule files)"
        purpose: "CI gate specification: P-003 enforcement grep, JSON Schema validation, governance.yaml checks"
        output: "skills/user-experience/work/eng-devsecops-ci-gate-spec.md"
        background: true
        quality_gate: "C4 >= 0.95"

      - id: "eng-qa-wave-benchmarks"
        agent: "jerry:eng-qa"
        when: "Each wave signoff phase (before signoff document creation)"
        purpose: "Per-wave quality benchmarks derived from the 27 acceptance criteria"
        output: "skills/user-experience/work/eng-qa-wave-{N}-benchmarks.md"
        background: true
        quality_gate: "C4 >= 0.95"

      - id: "eng-security-mcp-credentials"
        agent: "jerry:eng-security"
        when: "pipeline_foundation phase-3 AND pipeline_wave5 phase-3 (ai-first-design MCP)"
        purpose: "MCP credential handling review, OAuth token lifecycle, secure storage patterns"
        output: "skills/user-experience/work/eng-security-mcp-review.md"
        background: true
        quality_gate: "C4 >= 0.95"

      - id: "eng-reviewer-wave-gate"
        agent: "jerry:eng-reviewer"
        when: "Each wave gate transition (after all pipeline artifacts pass)"
        purpose: "Final review gate: architecture compliance, security standards, test coverage"
        output: "skills/user-experience/work/eng-reviewer-wave-{N}-gate.md"
        background: true
        quality_gate: "C4 >= 0.95"

      - id: "eng-incident-failure-modes"
        agent: "jerry:eng-incident"
        when: "pipeline_integration phase-1 (after cross-framework handoff tests)"
        purpose: "MCP failure mode documentation, degraded-mode runbooks"
        output: "skills/user-experience/work/eng-incident-failure-modes.md"
        background: true
        quality_gate: "C4 >= 0.95"

  red_team:
    description: "/red-team agents invoked for purple team security testing at EPIC-007"

    invocations:
      - id: "red-recon-mcp-surface"
        agent: "jerry:red-recon"
