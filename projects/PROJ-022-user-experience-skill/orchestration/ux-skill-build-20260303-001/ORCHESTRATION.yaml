# =============================================================================
# QUALITY REVIEW PROTOCOL
# =============================================================================
quality_review_protocol:
  description: "C4 adversary review sequence executed as background agents after each creator output"

  per_artifact_review:
    agent_sequence:
      - step: 1
        agent_type: "jerry:adv-selector"
        action: "Map C4 criticality to strategy set — returns all 10 strategies for C4"
        background: true
      - step: 2
        agent_type: "jerry:adv-executor"
        action: "Execute all 10 strategy templates against the artifact, producing structured findings"
        background: true
        strategies:
          - "S-003 Steelman (MUST precede S-002 per H-16)"
          - "S-002 Devil's Advocate"
          - "S-001 Red Team Analysis"
          - "S-004 Pre-Mortem Analysis"
          - "S-007 Constitutional AI Critique"
          - "S-010 Self-Refine"
          - "S-011 Chain-of-Verification"
          - "S-012 FMEA"
          - "S-013 Inversion Technique"
          - "S-014 LLM-as-Judge"
      - step: 3
        agent_type: "jerry:adv-scorer"
        action: "Score using S-014 6-dimension rubric, produce weighted composite score"
        background: true
        scoring_dimensions:
          completeness: 0.20
          internal_consistency: 0.20
          methodological_rigor: 0.20
          evidence_quality: 0.15
          actionability: 0.15
          traceability: 0.10
        threshold: 0.95
        verdict_mapping:
          PASS: ">= 0.95"
          REVISE: "0.85 - 0.94"
          REJECTED: "< 0.85"

    revision_loop:
      max_iterations: 6
      on_revise: "Creator agent receives adv-scorer findings + adv-executor strategy findings → revises artifact → re-run adv-scorer"
      on_reject: "Creator agent receives full findings → substantial rework → re-run full adv-executor + adv-scorer"
      plateau_detection: "Score delta < 0.01 for 3 consecutive iterations → escalate to user"

    output_artifacts:
      per_review: "projects/PROJ-022-user-experience-skill/quality/{agent-id}-{iteration}.md"
      summary: "Stored in ORCHESTRATION.yaml quality.phase_scores.{agent-id}"

