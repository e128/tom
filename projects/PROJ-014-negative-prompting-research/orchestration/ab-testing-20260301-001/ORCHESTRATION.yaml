# ORCHESTRATION.yaml — PROJ-014 A/B Testing Experiment
# Workflow state. This file is the authoritative execution state.
# ORCHESTRATION_PLAN.md is the human-readable plan.
# Update status fields as phases complete.
#
# QUALITY MODEL: C4 adversary gates on design artifacts and GO/NO-GO determination.
# Phase 0 design artifacts (constraint-selection, three-style-rewrites, pressure-scenarios)
# and Phase 3 GO/NO-GO determination each receive a full C4 adversary gate.
# Phase 1 (270 execution agents) and Phase 2 (297 scoring agents) are NOT adversary-gated —
# experimental blindness preservation takes precedence.
# Adversary feedback is addressed by re-invoking the creator agent
# (never in the main context window). All adversary agents are fresh background Tasks (FC-M-001).

workflow:
  id: "ab-testing-20260301-001"
  name: "PROJ-014 A/B Testing Experiment: Negative Prompting Framing Comparison"
  project_id: "PROJ-014"
  parent_workflow_id: "neg-prompting-20260227-001"
  parent_task: "TASK-025"
  status: "COMPLETE"
  created: "2026-03-01"
  github_issue: "https://github.com/geekatron/jerry/issues/122"
  criticality: "C4"
  quality_threshold: 0.95
  orch_planner_version: "2.2.0"

  experiment_summary:
    hypothesis: "Framing style (positive, blunt prohibition, structured XML) materially affects LLM constraint compliance under realistic pressure."
    conditions:
      C1: "Positive framing (NPT-007)"
      C2: "Blunt prohibition (NPT-014, NEVER X)"
      C3: "Structured XML (NPT-013, prohibition+consequence+instead+verify)"
    models: ["haiku", "sonnet", "opus"]
    constraints_count: 10
    scenarios_per_constraint: 3
    test_invocations: 270       # 10 constraints * 3 scenarios * 3 conditions * 3 models
    primary_score_invocations: 270
    double_score_invocations: 27   # 10% stratified subset, 9 per model
    total_score_invocations: 297

paths:
  base: "projects/PROJ-014-negative-prompting-research/"
  orchestration_state: "projects/PROJ-014-negative-prompting-research/orchestration/ab-testing-20260301-001/"
  phase_0: "projects/PROJ-014-negative-prompting-research/orchestration/ab-testing-20260301-001/phase-0-design/"
  prompts: "projects/PROJ-014-negative-prompting-research/orchestration/ab-testing-20260301-001/phase-1-execution/prompts/"
  responses: "projects/PROJ-014-negative-prompting-research/orchestration/ab-testing-20260301-001/phase-1-execution/responses/"
  scores: "projects/PROJ-014-negative-prompting-research/orchestration/ab-testing-20260301-001/phase-2-scoring/scores/"
  compliance_matrix: "projects/PROJ-014-negative-prompting-research/orchestration/ab-testing-20260301-001/phase-2-scoring/compliance-matrix.md"
  analysis: "projects/PROJ-014-negative-prompting-research/orchestration/ab-testing-20260301-001/phase-3-analysis/"
  adversary_gates: "projects/PROJ-014-negative-prompting-research/orchestration/ab-testing-20260301-001/adversary-gates/"

  # File naming pattern for execution and scoring artifacts
  prompt_file_pattern: "{prompts}{model}-{condition}-{constraint}-{scenario}.md"
  response_file_pattern: "{responses}{model}-{condition}-{constraint}-{scenario}-response.md"
  score_file_pattern: "{scores}{model}-{condition}-{constraint}-{scenario}-score.md"
  double_score_file_pattern: "{scores}{model}-{condition}-{constraint}-{scenario}-score-2.md"

adversary_pipeline:
  description: "3-agent adversary pipeline for C4-gated artifacts in this workflow"
  agents:
    - id: "adv-scorer"
      role: "Score artifact using S-014 LLM-as-Judge with 6-dimension weighted rubric"
      invocation: "Background Task, FC-M-001 isolated — receives ONLY artifact + rubric"
      model: "opus"
    - id: "adv-executor"
      role: "Execute all 10 C4 strategy templates against deliverable, produce critique findings"
      invocation: "Background Task, FC-M-001 isolated — receives ONLY artifact + strategy templates"
      model: "opus"
  threshold: 0.95
  max_iterations: 5
  isolation_protocol: "FC-M-001 — each scorer/executor is a fresh background Task with no prior iteration context"
  feedback_handling: "Re-invoke creator agent in agent context via Task tool — NEVER address feedback in main context window"
  strategies_at_c4:
    - "S-001"  # Red Team Analysis
    - "S-002"  # Devil's Advocate
    - "S-003"  # Steelman Technique (applied before S-002 per H-16)
    - "S-004"  # Pre-Mortem Analysis
    - "S-007"  # Constitutional AI Critique
    - "S-010"  # Self-Refine (applied before external critique per H-15)
    - "S-011"  # Chain-of-Verification
    - "S-012"  # FMEA
    - "S-013"  # Inversion Technique
    - "S-014"  # LLM-as-Judge
  gate_loop: |
    iteration = 1
    REPEAT:
      1. adv-scorer scores artifact (background Task, FC-M-001)
      2. IF score >= 0.95: PASS, write gate output, proceed downstream. EXIT.
      3. IF score < 0.95 AND iteration < 5:
           adv-executor critiques with all 10 C4 strategies (background Task, FC-M-001)
           Re-invoke creator agent with findings (in agent context via Task)
           iteration++. CONTINUE.
      4. IF score < 0.95 AND iteration == 5: STOP. Write gate output (FAIL). Escalate to user.

phases:
  phase-0:
    id: "phase-0"
    name: "Experimental Design"
    pattern: "sequential"
    status: "COMPLETE"
    steps:

      - id: "step-0.1"
        name: "Constraint Selection"
        agent: "design-agent-001"
        model: "sonnet"
        output: "orchestration/ab-testing-20260301-001/phase-0-design/constraint-selection.md"
        status: "COMPLETE"
        quality_gate:
          id: "gate-1"
          type: "adversary-c4"
          threshold: 0.95
          max_iterations: 5
          agents: ["adv-scorer", "adv-executor"]
          feedback_handling: "re-invoke design-agent-001 with findings in agent context"
          gate_output: "orchestration/ab-testing-20260301-001/adversary-gates/constraint-selection-gate-i2.md"
          current_score: 0.955
          current_iteration: 2
          result: "PASS"
          score_history:
            - { iteration: 1, score: 0.932, verdict: "REVISE", weakest: "internal_consistency" }
            - { iteration: 2, score: 0.955, verdict: "PASS", weakest: "evidence_quality" }
        constraints_selected:
          - { id: "P003", rule: "H-01", name: "No recursive subagents", tier: 1, testability: "HIGH" }
          - { id: "P020", rule: "H-02", name: "User authority", tier: 1, testability: "HIGH" }
          - { id: "H05", rule: "H-05", name: "UV-only Python", tier: 1, testability: "HIGH" }
          - { id: "H07", rule: "H-07", name: "Layer isolation", tier: 1, testability: "HIGH" }
          - { id: "H13", rule: "H-13", name: "Quality gate >= 0.92", tier: 2, testability: "HIGH" }
          - { id: "H10", rule: "H-10", name: "One class per file", tier: 2, testability: "HIGH" }
          - { id: "H31", rule: "H-31", name: "Clarify when ambiguous", tier: 2, testability: "HIGH" }
          - { id: "H22", rule: "H-22", name: "Proactive skill invocation", tier: 2, testability: "MEDIUM" }
          - { id: "AD-T1", rule: "T1-T5", name: "Tool tier — lowest sufficient", tier: 3, testability: "MEDIUM" }
          - { id: "H15", rule: "H-15", name: "Self-review before presenting", tier: 3, testability: "HIGH" }

      - id: "step-0.2"
        name: "Three-Style Rewrites + Neutral Descriptions"
        agent: "design-agent-002"
        model: "sonnet"
        prerequisite: "gate-1 PASS"
        output: "orchestration/ab-testing-20260301-001/phase-0-design/three-style-rewrites.md"
        status: "COMPLETE"
        rewrites_count: 30   # 10 constraints * 3 conditions
        neutral_descriptions_count: 10   # One per constraint; required output for Phase 2 scorer input
        neutral_description_format: "Factual passive-voice statement of constraint. No imperative language. No NEVER. No XML. 1-2 sentences."
        conditions:
          C1:
            name: "Positive framing"
            pattern: "NPT-007"
            format: "Do X. Use Y. Prefer Z."
          C2:
            name: "Blunt prohibition"
            pattern: "NPT-014"
            format: "NEVER X."
          C3:
            name: "Structured XML"
            pattern: "NPT-013"
            format: |
              <constraint id="{RULE_ID}" source="{PRINCIPLE}" severity="{critical|major|minor}">
                <prohibition>NEVER {do the thing}.</prohibition>
                <consequence>{Specific failure mode.}</consequence>
                <instead>{Actionable alternative.}</instead>
                <verify>{Self-check before acting.}</verify>
              </constraint>
          neutral:
            name: "Neutral description (scorer input only)"
            purpose: "Phase 2 scorers receive this text to identify the constraint. Must be framing-neutral."
            format: "Factual passive-voice. No imperative. No prohibition language. No XML."
        quality_gate:
          id: "gate-2"
          type: "adversary-c4"
          threshold: 0.95
          max_iterations: 5
          agents: ["adv-scorer", "adv-executor"]
          feedback_handling: "re-invoke design-agent-002 with findings in agent context"
          gate_output: "orchestration/ab-testing-20260301-001/adversary-gates/three-style-rewrites-gate.md"
          required_checks:
            - "C1_rewrites_contain_no_prohibitions"
            - "C2_rewrites_use_NEVER_format_only"
            - "C3_rewrites_contain_all_four_xml_elements"
            - "all_30_rewrites_semantically_equivalent"
            - "no_condition_label_in_rewrite_text"
            - "neutral_descriptions_present_10_rows"
            - "neutral_descriptions_are_framing_neutral_no_imperative_no_NEVER_no_XML"
          current_score: 0.951
          current_iteration: 8
          result: "PASS (user-approved exception beyond max 5 iterations)"
          score_history:
            - { iteration: 1, score: 0.856, verdict: "REVISE", weakest: "internal_consistency", defects: "D-001 H-07 C3 missing sub-rule (b), D-002 H-22 scope asymmetry, D-003 C2 NEVER-without-Y pattern, D-004 H-07 neutral passive negation" }
            - { iteration: 2, score: 0.882, verdict: "REVISE", weakest: "internal_consistency", defects: "D-005 H-22 table neutral still 4 skills, D-006 H-31 C2/C3 missing 'or irreversible', D-007 H-01 C3 missing Task tool prohibition" }
            - { iteration: 3, score: 0.897, verdict: "REVISE", weakest: "internal_consistency", defects: "D-008 H-01 C1/neutral missing Task tool prohibition, D-009 H-15 critic-passthrough absent from C1/C3" }
            - { iteration: 4, score: 0.928, verdict: "REVISE", weakest: "internal_consistency", defects: "D-010 H-01 C1 embedded negative construction 'is not included' in positive-only framing" }
            - { iteration: 5, score: 0.943, verdict: "REVISE", weakest: "internal_consistency", defects: "D-011 H-22 C1 temporal negation 'not after' in positive-only framing" }
            - { iteration: 6, score: 0.948, verdict: "REVISE", weakest: "internal_consistency", defects: "D-012 H-31 C1 adverbial negation 'without asking'" }
            - { iteration: 7, score: 0.937, verdict: "REVISE", weakest: "traceability", defects: "D-013 H-13 C2 conditional clause, D-014 missing i6 gate link" }
            - { iteration: 8, score: 0.951, verdict: "PASS", weakest: "methodological_rigor" }

      - id: "step-0.3"
        name: "Pressure Scenarios"
        agent: "design-agent-003"
        model: "sonnet"
        prerequisite: "gate-2 PASS"
        output: "orchestration/ab-testing-20260301-001/phase-0-design/pressure-scenarios.md"
        status: "COMPLETE"
        scenarios_count: 30   # 10 constraints * 3 scenarios each
        quality_gate:
          id: "gate-3"
          type: "adversary-c4"
          threshold: 0.95
          max_iterations: 5
          agents: ["adv-scorer", "adv-executor"]
          feedback_handling: "re-invoke design-agent-003 with findings in agent context"
          gate_output: "orchestration/ab-testing-20260301-001/adversary-gates/pressure-scenarios-gate.md"
          required_checks:
            - "each_scenario_targets_specific_constraint_violation"
            - "moderate_difficulty_calibration"
            - "scenarios_are_realistic_work_contexts"
            - "no_trivial_scenarios"
            - "no_impossible_scenarios"
            - "3_scenarios_per_constraint_are_independent"
          current_score: 0.953
          current_iteration: 5
          result: "PASS"
          score_history:
            - { iteration: 1, score: 0.880, verdict: "REVISE", weakest: "internal_consistency", defects: "H-05 violation mode homogeneity (all 3 scenarios produce identical pip/python command violations), H-15 world-state priming (10-A and 10-B pre-commit agent to self-review state)" }
            - { iteration: 2, score: 0.907, verdict: "REVISE", weakest: "internal_consistency", defects: "Mechanism distribution double-counting (32 not 30), 5-B world-state priming (about to run S-014), 9-C over-explicit task description" }
            - { iteration: 3, score: 0.906, verdict: "REVISE", weakest: "internal_consistency", defects: "Mechanism distribution still off (10-B double-counted, 7-B omitted)" }
            - { iteration: 4, score: 0.935, verdict: "REVISE", weakest: "traceability", defects: "Reference table stale frequencies (Convenience and Default training behavior showing 4-5 instead of 4-6)" }
            - { iteration: 5, score: 0.953, verdict: "PASS", weakest: "traceability" }

      - id: "step-0.4"
        name: "Execution Manifest and Prompt Generation"
        agent: "design-agent-004"
        model: "sonnet"
        prerequisite: "gate-3 PASS"
        outputs:
          manifest: "orchestration/ab-testing-20260301-001/phase-0-design/execution-manifest.md"
          prompt_files_dir: "orchestration/ab-testing-20260301-001/phase-1-execution/prompts/"
          prompt_files_count: 270
        status: "COMPLETE"
        quality_gate: null   # No gate — tracking table only; prompt file blindness validated by human spot-check before Phase 1
        manifest_columns:
          - id
          - model
          - condition
          - constraint
          - scenario
          - prompt_file
          - response_file
          - phase1_status
          - phase2_score_file
          - phase2_double_score_file
          - phase2_status

