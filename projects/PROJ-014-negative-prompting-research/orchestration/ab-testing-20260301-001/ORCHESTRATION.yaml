statistical_power:
  formula: "Miettinen (1968) McNemar sample size formula"
  parameters:
    alpha: 0.05
    power_target: 0.80
    p12_assumed: 0.20
    p21_assumed: 0.10
    p_d_assumed: 0.30
    delta_assumed: 0.10
  formula_results:
    miettinen_no_cc: 234
    fleiss_cc: 253
    experiment_n: 270
  n_270_justification: "Fleiss CC (n=253) inflated ~7% for anticipated scoring attrition. 270 = 90 per model simplifies strata design."
  pooled_power_at_n270: "approximately 0.88 (primary analysis)"
  per_model_power_at_n90: "approximately 0.41 (exploratory only)"
  per_model_power_derivation: "delta/sqrt(p_d/n) = 0.10/sqrt(0.30/90) = 1.732; power = Phi(1.732 - 1.96) = Phi(-0.228) = 0.41"
  per_model_designation: "EXPLORATORY"
  multiple_comparisons:
    primary_3_conditions:
      comparisons: 3
      bonferroni_alpha: 0.0167
    extended_7_conditions:
      comparisons: 21
      bonferroni_alpha: 0.00238
      bh_fdr_alternative: true
  effect_sizes:
    primary: "Odds Ratio OR = b/c (scale: small 1.22-1.86, medium 1.86-3.00, large >= 3.00)"
    secondary: "Risk difference pi_d = (b-c)/n"
    tertiary: "Cohen's g = P - 0.5, P = max(b,c)/(b+c)"
  breslow_day:
    purpose: "Homogeneity of odds ratios across models — prerequisite for CMH pooling"
    if_rejected_p_lt_0.05: "Do NOT pool. Report per-model McNemar only."
    if_not_rejected_p_ge_0.05: "CMH pooling valid. Run CMH for pooled estimate."
  statistical_reference: "McNemar (1947); Miettinen (1968); Fleiss et al. (2003); R Companion rcompanion.org; Westfall et al. (2010) multiple McNemar"

