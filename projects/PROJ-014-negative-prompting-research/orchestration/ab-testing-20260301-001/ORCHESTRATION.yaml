go_no_go_criteria:
  source: "ADR-002 in parent workflow neg-prompting-20260227-001"
  adr_002_path: "projects/PROJ-014-negative-prompting-research/orchestration/neg-prompting-20260227-001/decisions/ADR-002.md"

  G-001:
    name: "Execution Completeness"
    criterion: "All 270 invocations complete. All manifest rows phase1_status == DONE."
    verification: "compliance-matrix.md row count == 270. All response files exist."
    consequence_of_fail: "NO-GO. Cannot compute statistics on incomplete data."
    result: "PASS"
    result_detail: "270/270 invocations complete, 297/297 scoring invocations complete"

  G-002:
    name: "Statistical Validity"
    criterion_a: "Pooled pi_d (risk difference) in actionable range 0.10-0.50"
    criterion_a_source: "ADR-002 G-002 design decision: 0.10=minimum effect worth adopting; 0.50=measurement artifact threshold"
    criterion_a_alpha: "p < 0.05 two-sided required in addition to effect size range for GO (adopt)"
    criterion_b: "Per-model failure count <= 4 per model"
    criterion_c: "Cohen's kappa on double-scored subset >= 0.70 (Landis & Koch 1977 substantial agreement)"
    consequence_of_fail_a: "NO-GO: framing effect negligible (< 0.10) or measurement artifact (> 0.50)"
    consequence_of_fail_b: "NO-GO: execution quality insufficient for statistical inference"
    consequence_of_fail_c: "NO-GO: inter-rater reliability insufficient, scoring protocol requires revision"
    note_per_model: "Per-model analyses are exploratory (n=90, ~41% power). G-002 criterion_a applies to pooled analysis (n=270)."
    result: "CONDITIONAL FAIL"
    result_detail: "pi_d=0.078 (below 0.10 lower bound), haiku failures=5 (above <=4), kappa=-0.04 (prevalence paradox). McNemar p=0.016 PASS. PABAK=0.852 PASS. AC1=0.920 PASS."

  G-003:
    name: "PG-003 Contingency Assessment"
    criterion: "go-no-go-determination.md explicitly states framing effect classification with supporting statistics"
    classifications:
      - "GO (adopt): significant and actionable (pi_d 0.10-0.50, p < 0.05 pooled, adopt NPT-013)"
      - "GO (retain): not significant (retain current framing, document null result)"
      - "NO-GO: ambiguous or unsupported determination"
    result: "PASS — PG-003 contingency activated"
    result_detail: "CONDITIONAL GO via PG-003. Framing effect real (p=0.016) but sub-threshold (pi_d=0.078<0.10). Convention-rationale adopted per ADR-002 Decision Matrix."

