# CONSTRAINTS.yaml — Machine-Readable Negative Prompt Enforcement Plan
# Source: Issue #122 NPT-013 Template (PROJ-014 Research)
# Workflow: pm-pmm-impl-20260228-001
# Version: 1.0
# Created: 2026-02-28
#
# ENFORCEMENT: Each constraint has a `verify` block with deterministic
# checks that can be evaluated at barrier transitions. The orchestrator
# MUST evaluate ALL constraints before proceeding past any barrier.
#
# USAGE:
#   1. Load this file at orchestration start
#   2. At each barrier, iterate `constraints` and run `verify.checks`
#   3. A constraint FAILS if ANY check evaluates to false
#   4. A failed critical constraint BLOCKS barrier transition
#   5. A failed major constraint triggers escalation + logging
#   6. Results are appended to barrier handoff artifacts

schema_version: "1.0"
workflow_id: "pm-pmm-impl-20260228-001"
enforcement_model: "barrier-transition-gate"
evaluation_points:
  - "barrier-1"
  - "barrier-2"
  - "barrier-3"
  - "barrier-4"

constraints:

  - id: "ORCH-C01"
    source: "Issue #122 comment"
    severity: "critical"
    applies_at: ["barrier-1", "barrier-2", "barrier-3", "barrier-4"]
    prohibition: >
      NEVER collapse the Orchestration Plan diagram or omit details
      from the Orchestration Plan.
    consequence: >
      Collapsed or abbreviated diagrams hide pipeline dependencies, agent
      assignments, and sync barrier rules — downstream implementers operate
      on incomplete mental models, leading to missed quality gates, skipped
      cross-pollination steps, and agents producing artifacts without
      required upstream inputs. Every omitted detail is a decision deferred
      to the implementer without context.
    instead: >
      Include both a full ASCII pipeline diagram showing all phases, agents,
      barriers, and statuses AND an extremely detailed Mermaid diagram with
      per-agent input/output, strategy mappings, and review gates. The Mermaid
      diagram must NOT be absent of details — every agent, every artifact,
      every cross-pollination flow must be explicitly represented.
    verify:
      description: "Diagram completeness validation"
      checks:
        - id: "C01-CHK-01"
          description: "Agent count in diagram matches agent registry"
          method: "count_comparison"
          source_a: "ORCHESTRATION_PLAN.md § Mermaid Diagram agent nodes"
          source_b: "ORCHESTRATION_PLAN.md § Agent Registry total unique agents"
          operator: "equals"
        - id: "C01-CHK-02"
          description: "Barrier count in diagram matches barrier definitions"
          method: "count_comparison"
          source_a: "ORCHESTRATION_PLAN.md § Mermaid Diagram barrier nodes"
          source_b: "ORCHESTRATION_PLAN.md § Barrier Definitions rows"
          operator: "equals"
        - id: "C01-CHK-03"
          description: "Every cross-pollination arrow has a named artifact"
          method: "grep_absence"
          target: "ORCHESTRATION_PLAN.md"
          pattern: "→.*handoff\\.md"
          expect: "at_least_one_match_per_barrier"

  - id: "ORCH-C02"
    source: "P-020, Issue #122 comment"
    severity: "critical"
    applies_at: ["pre-execution"]
    prohibition: >
      NEVER start implementation work without the orchestration plan being
      in APPROVED status.
    consequence: >
      Proceeding without plan approval means the entire implementation direction
      is set without validating architecture decisions, agent decomposition,
      quality thresholds, or scope boundaries. Wrong-direction implementation
      at this scale (5 agents, 15 templates, 10+ governance files) wastes
      significant effort and produces deliverables that may not align with intent.
    instead: >
      Verify ORCHESTRATION_PLAN.md status field is APPROVED before beginning
      Phase 1 execution. For overnight autonomous runs, the plan must be
      explicitly approved before the session starts.
    verify:
      description: "Plan approval status check"
      checks:
        - id: "C02-CHK-01"
          description: "Plan status is APPROVED"
          method: "frontmatter_field_check"
          target: "ORCHESTRATION_PLAN.md"
          field: "Status"
          expected_value: "APPROVED"
          operator: "equals"

  - id: "ORCH-C03"
    source: "quality-enforcement.md H-13"
    severity: "critical"
    applies_at: ["barrier-1", "barrier-2", "barrier-3", "barrier-4"]
    prohibition: >
      NEVER allow an upstream creator agent to proceed to the next phase
      without launching /adversary C3 background agents with quality
      score >= 0.95.
    consequence: >
      Unreviewed creator output flowing downstream propagates defects through
      all subsequent phases. Each undetected defect at phase N costs 3-5x more
      to fix at phase N+1. Without adversarial review, agent definitions may
      contain framework misapplication, routing ambiguity, constitutional
      violations, or incomplete guardrails that only surface during integration.
    instead: >
      After each creator agent completes its deliverable: (1) launch /adversary
      with the C3 strategy set, (2) score using adv-scorer with the 6-dimension
      weighted composite, (3) iterate creator-critic-revision cycle until
      score >= 0.95 or max iterations reached, (4) only then allow the
      deliverable to flow to the next phase.
    verify:
      description: "Adversarial quality gate enforcement"
      checks:
        - id: "C03-CHK-01"
          description: "Every phase artifact has an adv-scorer report"
          method: "file_existence_per_artifact"
          report_location: "quality/phase-{N}-*/adv-phase{N}-report.md"
          expect: "one_report_per_phase"
        - id: "C03-CHK-02"
          description: "All scores >= 0.95"
          method: "score_threshold"
          source: "adv-phase{N}-report.md"
          field: "composite_score"
          threshold: 0.95
          operator: "gte"
        - id: "C03-CHK-03"
          description: "Adversary ran BEFORE barrier transition"
          method: "timestamp_ordering"
          expect: "adversary_report.timestamp < barrier_transition.timestamp"

  - id: "ORCH-C04"
    source: "Issue #122 comment"
    severity: "critical"
    applies_at: ["barrier-1", "barrier-2", "barrier-3", "barrier-4"]
    prohibition: >
      NEVER use an unbounded number of iterations in the creator-critic-revision cycle.
    consequence: >
      Unbounded iteration loops consume unlimited tokens, create context exhaustion
      risk, and can oscillate without convergence — the quality score plateaus or
      fluctuates while the context window fills with revision artifacts.
    instead: >
      Bound all iteration cycles: max 5 iterations for this C3 workflow. Track
      quality score deltas across iterations. Apply plateau detection: if score
      delta < 0.01 for 3 consecutive iterations, halt and log the current best
      result with critic findings. Never exceed the ceiling regardless of score.
    verify:
      description: "Iteration bound enforcement"
      checks:
        - id: "C04-CHK-01"
          description: "No artifact exceeds 5 revision iterations"
          method: "iteration_count"
          source: "adv-phase{N}-report.md"
          field: "iteration_count"
          max_value: 5
          operator: "lte"
        - id: "C04-CHK-02"
          description: "Plateau detection applied"
          method: "delta_check"
          description_detail: >
            If 3 consecutive iterations have score delta < 0.01,
            the cycle was halted early
          threshold: 0.01
          consecutive_count: 3

  - id: "ORCH-C05"
    source: "Issue #122 comment"
    severity: "major"
    applies_at: ["barrier-1", "barrier-2", "barrier-3", "barrier-4"]
    prohibition: >
      NEVER use one agent for all adversary strategies.
    consequence: >
      A single adversary agent executing all strategies develops anchoring bias
      from its first strategy evaluation — subsequent strategy applications are
      colored by prior findings rather than providing independent perspectives.
      The purpose of multi-strategy review is genuinely different attack angles;
      a single executor conflates those angles into one biased viewpoint.
    instead: >
      Launch separate adv-executor instances for each strategy or strategy group.
      Use background agents (Task tool) for fresh context isolation per FC-M-001.
      At minimum, separate: (a) constitutional strategies (S-007),
      (b) dialectical strategies (S-002, S-003), (c) analytical strategies
      (S-012, S-013), (d) scoring strategies (S-014).
    verify:
      description: "Multi-executor validation"
      checks:
        - id: "C05-CHK-01"
          description: "At least 3 distinct adv-executor Task invocations per phase"
          method: "task_invocation_count"
          agent: "adv-executor"
          min_count: 3
        - id: "C05-CHK-02"
          description: "No single executor handled more than 3 strategies"
          method: "strategy_per_executor"
          max_strategies_per_executor: 3

  - id: "ORCH-C06"
    source: "Issue #122 comment"
    severity: "major"
    applies_at: ["barrier-1", "barrier-2", "barrier-3", "barrier-4"]
    prohibition: >
      NEVER use /adversary only at the end of the orchestration pipeline.
    consequence: >
      End-only adversarial review discovers defects after all phases are complete —
      by which point every artifact is interdependent. Fixing a foundational defect
      in architecture (Phase 1) after integration (Phase 4) requires cascading
      rework across all 5 agent definitions, 15 templates, SKILL.md, governance
      files, and workflow patterns. Late detection cost: 10-20x early detection.
    instead: >
      Apply /adversary at EVERY sync barrier — after Phase 1, 2, 3, and 4.
      Each barrier must include adversarial quality gates before any
      cross-pollination artifacts flow downstream.
    verify:
      description: "Per-barrier adversary execution"
      checks:
        - id: "C06-CHK-01"
          description: "Adversarial report exists for every barrier"
          method: "file_existence"
          paths:
            - "quality/phase-1-setup/qa-strategy.md"
            - "quality/phase-2-gate/adv-phase2-report.md"
            - "quality/phase-3-gate/adv-phase3-report.md"
            - "quality/phase-4-tournament/tournament-report.md"

  - id: "ORCH-C07"
    source: "Issue #122 comment"
    severity: "major"
    applies_at: ["barrier-1", "barrier-2", "barrier-3", "barrier-4"]
    prohibition: >
      NEVER address adversarial feedback in the main context window.
    consequence: >
      Revision work in the main context consumes orchestrator context budget.
      The orchestrator's role is coordination, not content creation. Revision
      cycles in the main context create context rot risk (AE-006), pollute
      orchestration state, and prevent fresh-context review (FC-M-001).
    instead: >
      Delegate all revision work to background subagents via the Task tool.
      The creator agent receives adversarial feedback and produces revisions
      in its own fresh context. The orchestrator only tracks: artifact ID,
      iteration count, current score, pass/fail verdict.
    verify:
      description: "Main context protection"
      checks:
        - id: "C07-CHK-01"
          description: "Revisions performed via Task tool invocations"
          method: "task_tool_usage"
          expect: "all_revisions_via_task"
        - id: "C07-CHK-02"
          description: "Main context message count did not spike during revision"
          method: "context_growth_rate"
          max_messages_per_revision_cycle: 5

  - id: "ORCH-C08"
    source: "Issue #122 comment"
    severity: "major"
    applies_at: ["barrier-1", "barrier-2", "barrier-3", "barrier-4"]
    prohibition: >
      NEVER leave adversarial feedback unaddressed.
    consequence: >
      Unaddressed feedback items are acknowledged defects that ship with the
      deliverable. Each unaddressed item erodes quality gate credibility — if
      feedback can be ignored, the creator-critic-revision cycle becomes
      performative rather than substantive.
    instead: >
      For each adversarial finding: either (a) revise the deliverable to address
      the finding, or (b) document a specific, falsifiable justification for why
      the finding does not apply. Both must be reviewed by adv-scorer.
    verify:
      description: "Feedback address completeness"
      checks:
        - id: "C08-CHK-01"
          description: "Finding count == addressed count"
          method: "count_comparison"
          source_a: "adv-executor findings count"
          source_b: "revision addressed/justified count"
          operator: "equals"

  - id: "ORCH-C09"
    source: "P-003, H-01"
    severity: "critical"
    applies_at: ["barrier-1", "barrier-2", "barrier-3", "barrier-4"]
    prohibition: >
      NEVER overuse the main context window for implementation work.
    consequence: >
      Implementation work in the main context consumes the orchestrator's
      coordination budget. Context fills with agent definition content, template
      text, and revision artifacts — leaving insufficient context for tracking
      pipeline state, managing barriers, and coordinating cross-pollination.
      Context exhaustion triggers AE-006 compaction.
    instead: >
      Delegate ALL content creation to specialized background agents via Task.
      The main context orchestrates: phase transitions, barrier management,
      quality gate tracking, worktracker updates, and git commits.
    verify:
      description: "Context budget protection"
      checks:
        - id: "C09-CHK-01"
          description: "All implementation artifacts exist as files"
          method: "artifact_persistence"
          expect: "no_inline_implementation_content"
        - id: "C09-CHK-02"
          description: "Context fill below CRITICAL tier"
          method: "context_fill_level"
          max_tier: "WARNING"
          threshold: 0.70

  - id: "ORCH-C10"
    source: "Issue #122 comment"
    severity: "major"
    applies_at: ["barrier-1", "barrier-2", "barrier-3", "barrier-4"]
    prohibition: >
      NEVER allow low-quality creator outputs to flow downstream to the next phase.
    consequence: >
      Low-quality outputs that pass a barrier become inputs to the next phase.
      Those agents build on the flawed foundation — their outputs inherit and
      amplify upstream defects. Error amplification ~1.3x per hop with structured
      handoffs (Google DeepMind).
    instead: >
      Enforce the quality gate at every barrier without exception. If an artifact
      scores below 0.95 after maximum iterations: (1) do NOT pass it downstream,
      (2) log the current best result with adversarial findings and revision
      history, (3) accept with caveats if score >= 0.90, (4) halt if < 0.90.
    verify:
      description: "Downstream quality gate"
      checks:
        - id: "C10-CHK-01"
          description: "Every artifact in barrier handoff has passing score"
          method: "handoff_score_check"
          source: "cross-pollination/barrier-{N}/*/handoff.md"
          field: "quality_score"
          threshold: 0.95
          operator: "gte"
        - id: "C10-CHK-02"
          description: "No FAIL/REVISE verdict in barrier handoff"
          method: "verdict_check"
          source: "cross-pollination/barrier-{N}/*/handoff.md"
          forbidden_values: ["FAIL"]

# --- BARRIER COMMIT PROTOCOL ---
# At each barrier completion, a git commit is created for auditability.

barrier_commit_protocol:
  enabled: true
  commit_message_template: |
    feat(pm-pmm): barrier-{N} complete — {pipeline_summary}

    Phase {N} deliverables:
    {artifact_list}

    Quality scores:
    {score_summary}

    Workflow: pm-pmm-impl-20260228-001
    Barrier: {N}/4
  commit_scope:
    - "projects/PROJ-018-pm-pmm-skill/"
  barriers:
    - id: "barrier-1"
      commit_includes:
        - "eng/phase-1-research/"
        - "sec/phase-1-threat-model/"
        - "quality/phase-1-setup/"
        - "cross-pollination/barrier-1/"
    - id: "barrier-2"
      commit_includes:
        - "eng/phase-2-tier1-agents/"
        - "sec/phase-2-agent-review/"
        - "quality/phase-2-gate/"
        - "cross-pollination/barrier-2/"
    - id: "barrier-3"
      commit_includes:
        - "eng/phase-3-tier2-agents/"
        - "sec/phase-3-integration-review/"
        - "quality/phase-3-gate/"
        - "cross-pollination/barrier-3/"
    - id: "barrier-4"
      commit_includes:
        - "eng/phase-4-integration/"
        - "sec/phase-4-final/"
        - "quality/phase-4-tournament/"
        - "cross-pollination/barrier-4/"
        - "synthesis/"

# --- OVERNIGHT EXECUTION MODE ---
overnight_execution:
  enabled: true
  human_gates: "disabled"
  auto_proceed: true
  commit_per_barrier: true
  token_limit_behavior: "pause_and_resume"
  pause_duration_minutes: 5
  max_retries_on_token_limit: 3
  escalation_on_critical_failure: "halt_and_log"
  quality_threshold_override: 0.95
  accept_with_caveats_threshold: 0.90
